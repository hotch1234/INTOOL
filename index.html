<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zen Globe Offline</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #05070d, #000000);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    .label {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: sans-serif;
      font-size: 13px;
      color: #8fbfff;
      opacity: 0.7;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
<div class="label">Zen Globe • Offline Mode</div>
<canvas id="globe"></canvas>

<script>
const canvas = document.getElementById("globe");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// Globe settings
const R = 160;
let rot = 0;
let velocity = 0.002;
let dragging = false;
let lastX = 0;

// Pointer controls (mouse)
canvas.addEventListener("mousedown", (e) => {
  dragging = true;
  lastX = e.clientX;
  velocity = 0;
});

canvas.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  rot += dx * 0.005;
  velocity = dx * 0.0005;
  lastX = e.clientX;
});

// Touch controls (mobile)
canvas.addEventListener("touchstart", (e) => {
  dragging = true;
  lastX = e.touches[0].clientX;
  velocity = 0;
});

canvas.addEventListener("touchend", () => dragging = false);

canvas.addEventListener("touchmove", (e) => {
  if (!dragging) return;
  const dx = e.touches[0].clientX - lastX;
  rot += dx * 0.005;
  velocity = dx * 0.0005;
  lastX = e.touches[0].clientX;
});

// Draw globe
function draw() {
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(w / 2, h / 2);

  // soft glow
  const glow = ctx.createRadialGradient(0, 0, 10, 0, 0, R * 1.6);
  glow.addColorStop(0, "rgba(80,140,255,0.18)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.6, 0, Math.PI * 2);
  ctx.fill();

  // outer sphere
  ctx.strokeStyle = "rgba(120,180,255,0.25)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.stroke();

  // latitude lines
  for (let lat = -80; lat <= 80; lat += 20) {
    ctx.beginPath();

    for (let lon = 0; lon <= 360; lon += 2) {
      const phi = lat * Math.PI / 180;
      const theta = (lon * Math.PI / 180) + rot;

      const x = R * Math.cos(phi) * Math.cos(theta);
      const y = R * Math.sin(phi);

      if (lon === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "rgba(120,180,255,0.10)";
    ctx.stroke();
  }

  // longitude lines
  for (let lon = 0; lon < 360; lon += 20) {
    ctx.beginPath();

    for (let lat = -90; lat <= 90; lat += 2) {
      const phi = lat * Math.PI / 180;
      const theta = (lon * Math.PI / 180) + rot;

      const x = R * Math.cos(phi) * Math.cos(theta);
      const y = R * Math.sin(phi);

      if (lat === -90) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "rgba(120,180,255,0.06)";
    ctx.stroke();
  }

  ctx.restore();
}

// animation loop
function animate() {
  if (!dragging) rot += velocity;
  velocity *= 0.98;

  draw();
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
