<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Globe Offline (Google Zoom)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: radial-gradient(circle at center, #0a0f1f, #000);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    .label {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: sans-serif;
      font-size: 13px;
      color: #7fb6ff;
      opacity: 0.8;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
<div class="label">Zen Globe • Offline Google-Style Zoom</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== GLOBE SETTINGS =====
const BASE_R = 140;
let rot = 0;
let speed = 0.01;
let dragging = false;
let lastX = 0;

// ===== ZOOM SYSTEM =====
let zoom = 1;
let targetZoom = 1;
const minZoom = 0.6;
const maxZoom = 3;

function smoothZoom(){
  zoom += (targetZoom - zoom) * 0.08;
}

// ===== MOUSE CONTROLS =====
canvas.addEventListener("mousedown", e=>{
  dragging = true;
  lastX = e.clientX;
  speed = 0;
});

canvas.addEventListener("mouseup", ()=> dragging = false);

canvas.addEventListener("mousemove", e=>{
  if(!dragging) return;
  const dx = e.clientX - lastX;
  rot += dx * 0.01;
  speed = dx * 0.002;
  lastX = e.clientX;
});

// ===== WHEEL ZOOM (Google Maps style) =====
canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  targetZoom *= Math.exp(-e.deltaY * 0.001);
  targetZoom = Math.max(minZoom, Math.min(maxZoom, targetZoom));
});

// ===== TOUCH CONTROLS =====
let touchDist = 0;

canvas.addEventListener("touchstart", e=>{
  dragging = true;
  lastX = e.touches[0].clientX;
  speed = 0;

  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchDist = Math.sqrt(dx*dx + dy*dy);
  }
});

canvas.addEventListener("touchend", ()=> dragging = false);

canvas.addEventListener("touchmove", e=>{
  if(e.touches.length === 1){
    const dx = e.touches[0].clientX - lastX;
    rot += dx * 0.01;
    speed = dx * 0.002;
    lastX = e.touches[0].clientX;
  }

  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.sqrt(dx*dx + dy*dy);

    const diff = newDist - touchDist;
    targetZoom += diff * 0.005;
    targetZoom = Math.max(minZoom, Math.min(maxZoom, targetZoom));

    touchDist = newDist;
  }
});

// ===== DRAW FUNCTIONS =====
function drawSphere(R){
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  ctx.fillStyle = "#0b1a33";
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fill();
}

function drawGlow(R){
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const g = ctx.createRadialGradient(cx,cy,10,cx,cy,R*1.8);
  g.addColorStop(0,"rgba(80,140,255,0.25)");
  g.addColorStop(1,"transparent");

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx,cy,R*1.8,0,Math.PI*2);
  ctx.fill();
}

function drawGrid(R){
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  ctx.strokeStyle = "rgba(120,180,255,0.2)";
  ctx.lineWidth = 1;

  // latitude
  for(let lat=-80; lat<=80; lat+=20){
    ctx.beginPath();
    for(let lon=0; lon<=360; lon+=4){
      const phi = lat * Math.PI/180;
      const theta = (lon * Math.PI/180) + rot;

      const x = cx + R * Math.cos(phi) * Math.cos(theta);
      const y = cy + R * Math.sin(phi);

      if(lon===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // longitude
  for(let lon=0; lon<360; lon+=20){
    ctx.beginPath();
    for(let lat=-90; lat<=90; lat+=4){
      const phi = lat * Math.PI/180;
      const theta = (lon * Math.PI/180) + rot;

      const x = cx + R * Math.cos(phi) * Math.cos(theta);
      const y = cy + R * Math.sin(phi);

      if(lat===-90) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}

// ===== ANIMATION LOOP =====
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  smoothZoom();

  const R = BASE_R * zoom;

  if(!dragging) rot += speed;
  speed *= 0.98;

  drawGlow(R);
  drawSphere(R);
  drawGrid(R);

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
