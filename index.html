<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTOOL Navigation System</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #05070d;
  }

  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
    touch-action: none;
  }

  .hud {
    position: absolute;
    top: 12px;
    left: 12px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #7fb6ff;
    opacity: 0.85;
    user-select: none;
  }
</style>
</head>

<body>

<div class="hud">INTOOL • Navigation Engine (Offline)</div>
<canvas id="map"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* =========================
   CAMERA SYSTEM (MAP CORE)
========================= */

let camera = {
  x: 0,
  y: 0,
  zoom: 1
};

let targetZoom = 1;
let dragging = false;
let lastX = 0;
let lastY = 0;

/* =========================
   INERTIA SYSTEM
========================= */

let velX = 0;
let velY = 0;

/* =========================
   INPUT HANDLING
========================= */

canvas.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("mousemove", e => {
  if(!dragging) return;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  camera.x -= dx / camera.zoom;
  camera.y -= dy / camera.zoom;

  velX = dx;
  velY = dy;

  lastX = e.clientX;
  lastY = e.clientY;
});

/* TOUCH */
canvas.addEventListener("touchstart", e => {
  dragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", () => dragging = false);

canvas.addEventListener("touchmove", e => {
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;

  camera.x -= dx / camera.zoom;
  camera.y -= dy / camera.zoom;

  velX = dx;
  velY = dy;

  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

/* ZOOM (Google-style feel) */
canvas.addEventListener("wheel", e => {
  e.preventDefault();

  const zoomFactor = Math.exp(-e.deltaY * 0.001);
  targetZoom *= zoomFactor;

  targetZoom = Math.max(0.5, Math.min(5, targetZoom));
});

/* =========================
   SMOOTH CAMERA UPDATE
========================= */

function updateCamera(){
  camera.zoom += (targetZoom - camera.zoom) * 0.08;

  if(!dragging){
    camera.x -= velX * 0.05;
    camera.y -= velY * 0.05;

    velX *= 0.9;
    velY *= 0.9;
  }
}

/* =========================
   GRID MAP RENDERING
========================= */

function drawGrid(){
  const w = canvas.width;
  const h = canvas.height;

  ctx.strokeStyle = "rgba(120,180,255,0.12)";
  ctx.lineWidth = 1;

  const step = 50 * camera.zoom;

  for(let x = -2000; x < 2000; x += step){
    ctx.beginPath();
    ctx.moveTo(x - camera.x % step, 0);
    ctx.lineTo(x - camera.x % step, h);
    ctx.stroke();
  }

  for(let y = -2000; y < 2000; y += step){
    ctx.beginPath();
    ctx.moveTo(0, y - camera.y % step);
    ctx.lineTo(w, y - camera.y % step);
    ctx.stroke();
  }
}

/* =========================
   LANDMARKS (FAKE WORLD DATA)
========================= */

const points = [
  {x: 0, y: 0, name: "Origin"},
  {x: 300, y: 200, name: "Zone A"},
  {x: -400, y: -250, name: "Zone B"},
  {x: 600, y: -300, name: "Zone C"}
];

function drawPoints(){
  ctx.fillStyle = "#7fb6ff";
  ctx.font = "12px Arial";

  for(const p of points){
    const x = (p.x - camera.x) * camera.zoom + canvas.width/2;
    const y = (p.y - camera.y) * camera.zoom + canvas.height/2;

    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillText(p.name, x + 8, y - 8);
  }
}

/* =========================
   RENDER LOOP
========================= */

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  updateCamera();

  drawGrid();
  drawPoints();

  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
